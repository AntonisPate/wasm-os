[unstable]
# Αναγκάζει re-compile των βασικών libraries με τα δικά μας flags
build-std = ["core", "alloc", "compiler_builtins"]

[build]
target = "wasm32-unknown-unknown"

[target.wasm32-unknown-unknown]
rustflags = [
    "-C",
    "target-feature=+atomics,+bulk-memory,+mutable-globals",
    "-C",
    "link-arg=--import-memory",
    "-C",
    "link-arg=--shared-memory",
    "-C",
    "link-arg=--export-dynamic",
    "-C",
    "link-arg=--initial-memory=4194304",
    "-C",
    "link-arg=--max-memory=16777216",
    "-C",
    "link-arg=--allow-undefined",
]
