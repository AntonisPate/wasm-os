<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <title>Wasm OS Terminal</title>
    <style>
      :root {
        --bg: #000000;
        --text: #00ff00;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Consolas", "Courier New", monospace;
        margin: 0;
        padding: 10px;
        height: 100vh;
        box-sizing: border-box;
        overflow: hidden;
      }
      #terminal {
        width: 100%;
        height: 100%;
        white-space: pre-wrap;
        overflow-y: auto;
        word-break: break-all;
        font-size: 16px;
        line-height: 1.2;
      }
      .cursor {
        display: inline-block;
        width: 10px;
        height: 1em;
        background-color: var(--text);
        vertical-align: bottom;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="terminal"><span id="output"></span><span class="cursor"></span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
